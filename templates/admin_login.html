<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 flex items-center justify-center p-4">
    <div class="w-full max-w-sm">
        <!-- Lock Icon -->
        <div class="text-center mb-6">
            <div class="inline-flex items-center justify-center w-14 h-14 rounded-full bg-red-600/20 border border-red-500/30 mb-3">
                <svg class="w-7 h-7 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                </svg>
            </div>
            <h1 class="text-xl font-bold text-white">Zdmin Access</h1>
            <p class="text-slate-500 text-sm mt-1">Authorized personnel only</p>
        </div>

        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="mb-4 p-3 rounded-lg bg-red-500/20 border border-red-500/30 text-red-300 text-sm text-center">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <!-- Login Form -->
        <form method="POST" class="bg-white/5 backdrop-blur-xl border border-white/10 rounded-2xl p-6 shadow-2xl space-y-4">
            <div>
                <label for="username" class="block text-xs font-medium text-slate-400 mb-1.5">Username</label>
                <input type="text" id="username" name="username" required autocomplete="off"
                    class="w-full px-3.5 py-2.5 bg-white/5 border border-white/10 rounded-lg text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-red-500/50 focus:border-transparent text-sm">
            </div>
            <div>
                <label for="password" class="block text-xs font-medium text-slate-400 mb-1.5">Password</label>
                <input type="password" id="password" name="password" required
                    class="w-full px-3.5 py-2.5 bg-white/5 border border-white/10 rounded-lg text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-red-500/50 focus:border-transparent text-sm">
            </div>
            <button type="submit"
                class="w-full py-2.5 bg-red-600 hover:bg-red-700 text-white font-medium rounded-lg transition-all text-sm">
                Login
            </button>
        </form>

        <p class="text-center mt-4">
            <a href="{{ url_for('upload_form') }}" class="text-slate-600 hover:text-slate-400 text-xs transition-colors">Back to app</a>
        </p>
    </div>
</body>
</html>
